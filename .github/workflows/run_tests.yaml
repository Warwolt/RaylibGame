name: run_tests
on:
  pull_request:
jobs:
  run_tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          submodules: recursive

      # Mesa is used to support OpenGL on windows-latest
      - name: Download Mesa
        shell: pwsh
        run: |
          $url = "https://github.com/pal1000/mesa-dist-win/releases/latest/download/mesa3d.zip"
          Invoke-WebRequest $url -OutFile mesa.zip
          Expand-Archive mesa.zip -DestinationPath mesa

      - name: Setup CMake
        uses: threeal/cmake-action@v2.1.0

      - name: Build
        run: cmake --build build

      - name: Setup Mesa
        shell: pwsh
        run: |
          Copy-Item mesa/x64/opengl32.dll build/Debug/ -Force
          echo "LIBGL_ALWAYS_SOFTWARE=1" >> $env:GITHUB_ENV

      - name: Run tests
        run: ./build/Debug/Tests.exe
